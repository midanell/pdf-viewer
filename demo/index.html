<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Viewer Demo</title>
    <link rel="stylesheet" href="/node_modules/pdfjs-dist/web/pdf_viewer.css" />
    <script type="importmap">
      {
        "imports": {
          "pdfjs-dist": "/node_modules/pdfjs-dist/build/pdf.mjs"
        }
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        background: #525659;
        color: #ddd;
        font-family: sans-serif;
        overflow: hidden;
      }

      /* ── Sidebar ─────────────────────────────────────────── */
      #sidebar {
        flex: 1;
        min-width: 180px;
        max-width: 280px;
        background: #2d2f31;
        padding: 1rem;
        overflow-y: auto;
        user-select: none;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      .sidebar-title {
        margin: 0;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #888;
      }

      /* ── Control groups ──────────────────────────────────── */
      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      .ctrl-group-label {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #666;
        border-bottom: 1px solid #3a3c3e;
        padding-bottom: 0.25rem;
      }

      .ctrl-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      /* Only the row's own text label flexes — not the toggle (also a
         <label>) or the segmented control's inner labels (nested deeper). */
      .ctrl-row > label:not(.toggle) {
        font-size: 0.8rem;
        color: #bbb;
        flex: 1;
      }

      /* ── Toggle switch ───────────────────────────────────── */
      .toggle {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }
      .toggle input { opacity: 0; width: 0; height: 0; }
      .toggle-track {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #484a4d;
        border-radius: 20px;
        transition: background 0.18s;
      }
      .toggle input:checked + .toggle-track { background: #4a9eff; }
      .toggle-track::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.18s;
      }
      .toggle input:checked + .toggle-track::before { transform: translateX(16px); }

      /* ── Segmented control ───────────────────────────────── */
      .seg {
        display: flex;
        background: #1e2022;
        border-radius: 5px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .seg input[type="radio"] { display: none; }
      .seg label {
        padding: 3px 8px;
        font-size: 0.72rem;
        color: #888;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
        flex: 0;
      }
      .seg input[type="radio"]:checked + label {
        background: #4a9eff;
        color: #fff;
      }

      /* ── Text input ──────────────────────────────────────── */
      .ctrl-input {
        width: 100%;
        background: #1e2022;
        border: 1px solid #3a3c3e;
        border-radius: 4px;
        color: #ddd;
        font-size: 0.78rem;
        padding: 4px 7px;
        outline: none;
      }
      .ctrl-input:focus { border-color: #4a9eff; }

      /* Input + action button on one line */
      .po-row {
        display: flex;
        gap: 0.4rem;
        align-items: stretch;
      }
      .po-row .ctrl-input { flex: 1; min-width: 0; }
      .ctrl-btn {
        flex-shrink: 0;
        background: #1e2022;
        border: 1px solid #3a3c3e;
        border-radius: 4px;
        color: #bbb;
        font-size: 0.9rem;
        line-height: 1;
        padding: 0 9px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .ctrl-btn:hover { background: #34373a; border-color: #4a9eff; }
      .ctrl-btn:active { background: #4a9eff; border-color: #4a9eff; }
      .ctrl-hint {
        font-size: 0.68rem;
        color: #666;
        margin-top: -0.25rem;
      }

      /* ── Divider ─────────────────────────────────────────── */
      #divider {
        width: 6px;
        flex-shrink: 0;
        background: #1a1b1d;
        cursor: col-resize;
        transition: background 0.1s;
      }
      #divider:hover, #divider.dragging { background: #4a9eff; }

      /* ── Main/viewer ─────────────────────────────────────── */
      #main {
        position: relative;
        width: 800px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      #pdf-host { flex: 1; min-height: 0; }

      #pdf-host [data-page-number] {
        display: block;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>
    <aside id="sidebar">
      <h1 class="sidebar-title">PDF Viewer Demo</h1>

      <!-- Rendering -->
      <div class="ctrl-group">
        <div class="ctrl-group-label">Rendering</div>

        <div class="ctrl-row">
          <label for="opt-cache">Cache full PDF</label>
          <label class="toggle">
            <input type="checkbox" id="opt-cache" />
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="ctrl-row">
          <label>Sizing</label>
          <div class="seg">
            <input type="radio" name="sizing" id="sz-fw" value="fit-width" checked />
            <label for="sz-fw">Fit width</label>
            <input type="radio" name="sizing" id="sz-fp" value="fit-page" />
            <label for="sz-fp">Fit page</label>
            <input type="radio" name="sizing" id="sz-ex" value="explicit" />
            <label for="sz-ex">Scale</label>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <div class="ctrl-group">
        <div class="ctrl-group-label">Navigation</div>

        <div class="ctrl-row">
          <label>Scroll</label>
          <div class="seg">
            <input type="radio" name="scroll" id="sc-sm" value="smooth" checked />
            <label for="sc-sm">Smooth</label>
            <input type="radio" name="scroll" id="sc-in" value="instant" />
            <label for="sc-in">Instant</label>
          </div>
        </div>

        <div class="ctrl-row">
          <label for="opt-zoom-ctrl">Zoom controls</label>
          <label class="toggle">
            <input type="checkbox" id="opt-zoom-ctrl" checked />
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <!-- Page order -->
      <div class="ctrl-group">
        <div class="ctrl-group-label">Page order</div>

        <div>
          <div class="po-row">
            <input
              type="text"
              id="opt-page-order"
              class="ctrl-input"
              value="3,4,66,55"
              placeholder="e.g. 3,1,2"
            />
            <button
              type="button"
              id="opt-page-order-rand"
              class="ctrl-btn"
              title="Generate a random page order (max 10 pages)"
            >🎲</button>
          </div>
          <p class="ctrl-hint">Comma-separated page numbers to promote</p>
        </div>

        <div class="ctrl-row">
          <label for="opt-hide-unordered">Hide unordered pages</label>
          <label class="toggle">
            <input type="checkbox" id="opt-hide-unordered" />
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <!-- Text -->
      <div class="ctrl-group">
        <div class="ctrl-group-label">Text</div>

        <div class="ctrl-row">
          <label for="opt-native-sel">Native text selection</label>
          <label class="toggle">
            <input type="checkbox" id="opt-native-sel" checked />
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>
    </aside>

    <div id="divider"></div>

    <main id="main">
      <div id="pdf-host"></div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
